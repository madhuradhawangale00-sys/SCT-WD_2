<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stopwatch-container">
        <h1>STOPWATCH</h1>
        
        <div class="display" id="time-display">00:00:00.00</div>
        
        <div class="controls">
            <button id="start-btn" class="btn start">Start</button>
            <button id="pause-btn" class="btn pause" disabled>Pause</button>
            <button id="lap-btn" class="btn lap" disabled>Lap</button>
            <button id="reset-btn" class="btn reset">Reset</button>
        </div>

        <div class="laps-container">
            <h3>Lap Times</h3>
            <ul id="laps-list"></ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
